<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <main class="main">
      <section class="profile-card">
        <img
          id="profile-photo"
          src="assets/images/avatar-jessica.jpeg"
          alt="Jessica Randall profile photo"
          width="105"
          height="105"
        />
        <h1 id="name">Jessica Randall</h1>
        <p id="location">London, United Kingdom</p>
        <p id="bio">"Front-end developer and avid reader."</p>
        <nav aria-label="Social links" class="social-links">
          <ul>
            <li>
              <a href="https://github.com/jessica-randall" class="link-card"
                >GitHub</a
              >
            </li>
            <li>
              <a
                href="https://frontendmentor.io/jessica-randall"
                class="link-card"
                >Frontend Mentor</a
              >
            </li>
            <li>
              <a
                href="https://linkedin.com/in/jessica-randall"
                class="link-card"
                >LinkedIn</a
              >
            </li>
            <li>
              <a href="https://twitter.com/jessica_randall" class="link-card"
                >Twitter</a
              >
            </li>
            <li>
              <a href="https://instagram.com/jessica_randall" class="link-card"
                >Instagram</a
              >
            </li>
          </ul>
        </nav>
      </section>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by
      <a href="https://github.com/dawudasasfeh/Social-links-profile"
        >DawudAlasasfeh</a
      >.
    </footer>
  </body>
</html>
